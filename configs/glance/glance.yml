server:
  port: 8080

theme:
  background-color: 0 0 8
  primary-color: 40 60 55
  contrast-multiplier: 1.1

pages:
  - name: Home
    columns:
      - size: small
        widgets:
          - type: clock
            hour-format: "24h"
            timezones:
              - timezone: Europe/Lisbon
                label: Santo Tirso

          - type: weather
            location: Santo Tirso, Portugal
            units: metric
            hour-format: "24h"

          - type: search
            search-engine: duckduckgo
            autofocus: true

          - type: bookmarks
            groups:
              - title: Development
                links:
                  - title: GitHub
                    url: https://github.com
                  - title: Docker Hub
                    url: https://hub.docker.com
                  - title: Stack Overflow
                    url: https://stackoverflow.com

              - title: Infrastructure
                links:
                  - title: Tailscale
                    url: https://login.tailscale.com/admin
                  - title: Cloudflare
                    url: https://dash.cloudflare.com

              - title: Documentation
                links:
                  - title: Glance
                    url: https://github.com/glanceapp/glance
                  - title: Home Assistant
                    url: https://www.home-assistant.io/docs/
                  - title: Traefik
                    url: https://doc.traefik.io/traefik/

      - size: full
        widgets:
          - type: monitor
            title: Services Status
            cache: 1m
            allow-insecure: true
            sites:
              - title: Home Assistant
                url: http://homeassistant:8123
                icon: si:homeassistant
              - title: AdGuard Home
                url: http://adguard:8080
                icon: si:adguard
              - title: Grafana
                url: http://grafana:3000
                icon: si:grafana
              - title: Uptime Kuma
                url: http://uptime-kuma:3001
                icon: si:uptimekuma
              - title: Vaultwarden
                url: http://vaultwarden:80
                icon: si:bitwarden
              - title: Portainer
                url: http://portainer:9000
                icon: si:portainer
              - title: Traefik
                url: http://traefik:8080
                icon: si:traefikproxy

          - type: group
            widgets:
              - type: bookmarks
                title: Smart Home
                groups:
                  - links:
                      - title: Home Assistant
                        url: https://homeassistant.home.lan
                        icon: si:homeassistant
                      - title: AdGuard Home
                        url: https://adguard.home.lan
                        icon: si:adguard
                      - title: Authelia
                        url: https://auth.home.lan
                        icon: si:authelia
                      - title: Vaultwarden
                        url: https://vaultwarden.home.lan
                        icon: si:bitwarden
                      - title: PriceBuddy
                        url: https://pricebuddy.home.lan
                        icon: si:tag

              - type: bookmarks
                title: Vehicles
                groups:
                  - links:
                      - title: TeslaMate Model 3
                        url: https://teslamate-model3.home.lan
                        icon: si:tesla
                      - title: TeslaMate Model Y
                        url: https://teslamate-modely.home.lan
                        icon: si:tesla

          - type: group
            widgets:
              - type: bookmarks
                title: Observability
                groups:
                  - links:
                      - title: Grafana
                        url: https://grafana.home.lan
                        icon: si:grafana
                      - title: Prometheus
                        url: https://prometheus.home.lan
                        icon: si:prometheus
                      - title: Uptime Kuma
                        url: https://uptime.home.lan
                        icon: si:uptimekuma
                      - title: cAdvisor
                        url: https://cadvisor.home.lan
                        icon: si:google
                      - title: Apprise
                        url: https://apprise.home.lan
                        icon: si:apprise
                      - title: n8n
                        url: https://n8n.home.lan
                        icon: si:n8n

              - type: bookmarks
                title: System
                groups:
                  - links:
                      - title: Portainer
                        url: https://portainer.home.lan
                        icon: si:portainer
                      - title: Traefik
                        url: https://traefik.home.lan
                        icon: si:traefikproxy
                      - title: Dozzle
                        url: https://dozzle.home.lan
                        icon: si:docker
