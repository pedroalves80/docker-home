server:
  port: 8080

theme:
  background-color: 225 14 15
  primary-color: 43 50 70
  positive-color: 150 80 55
  negative-color: 0 80 55
  contrast-multiplier: 1.1

pages:
  - name: Home
    columns:
      - size: small
        widgets:
          - type: calendar

          - type: weather
            location: Santo Tirso, Portugal
            units: metric
            hour-format: "24h"

          - type: markets
            title: Markets
            markets:
              - symbol: TSLA
                name: Tesla
              - symbol: NVDA
                name: NVIDIA
              - symbol: AAPL
                name: Apple
              - symbol: BTC-USD
                name: Bitcoin
              - symbol: ETH-USD
                name: Ethereum

          - type: twitch-channels
            channels:
              - theo
              - theprimeagen
              - bashbunni
              - tsoding
              - rwxrob

      - size: full
        widgets:
          - type: search
            search-engine: duckduckgo
            autofocus: true

          - type: group
            widgets:
              - type: hacker-news
                limit: 8
                collapse-after: 4

              - type: reddit
                subreddit: selfhosted
                limit: 6
                collapse-after: 3

          - type: group
            widgets:
              - type: reddit
                subreddit: homelab
                limit: 6
                collapse-after: 3

              - type: reddit
                subreddit: programming
                limit: 6
                collapse-after: 3

          - type: videos
            title: Tech YouTube
            channels:
              - UCsBjURrPoezykLs9EqgamOA  # Fireship
              - UCR-DXc1voovS8nhAvccRZhg  # Jeff Geerling
              - UC9-y-6csu5WGm29I7JiwpnA  # Computerphile
              - UCVHFbqXqoYvEWM1Ddxl0QKg  # Level1Techs
              - UCOk-gHyjcWZNj3Br4oxwh0A  # Techno Tim
            limit: 6

      - size: small
        widgets:
          - type: clock
            hour-format: "24h"
            timezones:
              - timezone: Europe/Lisbon
                label: Santo Tirso

          - type: repository
            repository: pedroalves80/docker-home
            pull-requests-limit: 3
            issues-limit: 3

          - type: bookmarks
            groups:
              - title: Quick Links
                links:
                  - title: GitHub
                    url: https://github.com
                  - title: Tailscale
                    url: https://login.tailscale.com/admin
                  - title: Cloudflare
                    url: https://dash.cloudflare.com

  - name: Homelab
    columns:
      - size: small
        widgets:
          - type: clock
            hour-format: "24h"
            timezones:
              - timezone: Europe/Lisbon
                label: Santo Tirso

          - type: bookmarks
            groups:
              - title: Smart Home
                links:
                  - title: Home Assistant
                    url: https://homeassistant.home.lan
                  - title: AdGuard
                    url: https://adguard.home.lan
                  - title: Authelia
                    url: https://auth.home.lan

              - title: Monitoring
                links:
                  - title: Grafana
                    url: https://grafana.home.lan
                  - title: Prometheus
                    url: https://prometheus.home.lan
                  - title: Uptime Kuma
                    url: https://uptime.home.lan
                  - title: Dozzle
                    url: https://dozzle.home.lan

              - title: System
                links:
                  - title: Portainer
                    url: https://portainer.home.lan
                  - title: Traefik
                    url: https://traefik.home.lan
                  - title: n8n
                    url: https://n8n.home.lan

              - title: Apps
                links:
                  - title: Vaultwarden
                    url: https://vaultwarden.home.lan
                  - title: PriceBuddy
                    url: https://pricebuddy.home.lan
                  - title: TeslaMate M3
                    url: https://teslamate-model3.home.lan
                  - title: TeslaMate MY
                    url: https://teslamate-modely.home.lan

      - size: full
        widgets:
          - type: monitor
            title: Services
            cache: 1m
            sites:
              - title: Home Assistant
                url: https://homeassistant.home.lan
                check-url: http://homeassistant:8123
                icon: si:homeassistant
              - title: AdGuard
                url: https://adguard.home.lan
                check-url: http://adguard:8080
                icon: si:adguard
              - title: Grafana
                url: https://grafana.home.lan
                check-url: http://grafana:3000
                icon: si:grafana
              - title: Uptime Kuma
                url: https://uptime.home.lan
                check-url: http://uptime-kuma:3001
                icon: si:uptimekuma
              - title: Vaultwarden
                url: https://vaultwarden.home.lan
                check-url: http://vaultwarden:80
                icon: si:bitwarden
              - title: Portainer
                url: https://portainer.home.lan
                check-url: http://portainer:9000
                icon: si:portainer
              - title: Traefik
                url: https://traefik.home.lan
                check-url: http://traefik:8080
                icon: si:traefikproxy
              - title: Authelia
                url: https://auth.home.lan
                check-url: http://authelia:9091
                icon: si:authelia
              - title: TeslaMate M3
                url: https://teslamate-model3.home.lan
                check-url: http://teslamate_model3:4000
                icon: si:tesla
              - title: TeslaMate MY
                url: https://teslamate-modely.home.lan
                check-url: http://teslamate_modely:4000
                icon: si:tesla
              - title: n8n
                url: https://n8n.home.lan
                check-url: http://n8n:5678
                icon: si:n8n
              - title: PriceBuddy
                url: https://pricebuddy.home.lan
                check-url: http://pricebuddy:80

          - type: rss
            title: Self-Hosted News
            limit: 10
            collapse-after: 5
            feeds:
              - url: https://selfh.st/rss/
              - url: https://www.reddit.com/r/selfhosted/.rss

      - size: small
        widgets:
          - type: releases
            title: Release Tracker
            repositories:
              - traefik/traefik
              - grafana/grafana
              - louislam/uptime-kuma
              - glanceapp/glance
              - home-assistant/core
              - dani-garcia/vaultwarden
