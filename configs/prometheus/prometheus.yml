global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'teslamate'
    static_configs:
      - targets: ['teslamate_model3:4000', 'teslamate_modely:4000']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

