---
- Smart Home:
    - Home Assistant:
        icon: home-assistant.png
        href: https://homeassistant.home.lan
        description: Automation & Control
        server: local
        container: homeassistant

    - AdGuard Home:
        icon: adguard-home.png
        href: https://adguard.home.lan
        description: DNS & Ad Blocking
        server: local
        container: adguard
        widget:
          type: adguard
          url: http://adguard:8080
          username: {{HOMEPAGE_VAR_ADGUARD_USERNAME}}
          password: {{HOMEPAGE_VAR_ADGUARD_PASSWORD}}

    - Authelia:
        icon: authelia.png
        href: https://auth.home.lan
        description: SSO & 2FA
        server: local
        container: authelia

    - Vaultwarden:
        icon: vaultwarden.png
        href: https://vaultwarden.home.lan
        description: Password Manager
        server: local
        container: vaultwarden

    - PriceBuddy:
        icon: mdi-tag-multiple-outline
        href: https://pricebuddy.home.lan
        description: Price Tracking
        server: local
        container: pricebuddy

- Vehicles:
    - Model 3:
        icon: si-tesla
        href: https://teslamate-model3.home.lan
        description: TeslaMate Tracking
        server: local
        container: teslamate_model3

    - Model Y:
        icon: si-tesla
        href: https://teslamate-modely.home.lan
        description: TeslaMate Tracking
        server: local
        container: teslamate_modely

- Observability:
    - Grafana:
        icon: grafana.png
        href: https://grafana.home.lan
        description: Dashboards & Analytics
        server: local
        container: grafana

    - Prometheus:
        icon: prometheus.png
        href: https://prometheus.home.lan
        description: Metrics Database
        server: local
        container: prometheus
        widget:
          type: prometheus
          url: http://prometheus:9090

    - Uptime Kuma:
        icon: uptime-kuma.png
        href: https://uptime.home.lan
        description: Status Monitoring
        server: local
        container: uptime-kuma
        widget:
          type: uptimekuma
          url: http://uptime-kuma:3001
          slug: home-server

    - cAdvisor:
        icon: cadvisor.png
        href: https://cadvisor.home.lan
        description: Container Metrics
        server: local
        container: cadvisor

    - Node Exporter:
        icon: prometheus.png
        href: https://node-exporter.home.lan
        description: System Metrics
        server: local
        container: node-exporter

    - Apprise:
        icon: apprise.png
        href: https://apprise.home.lan
        description: Notification Gateway
        server: local
        container: apprise

    - Diun:
        icon: diun.png
        href: https://github.com/crazy-max/diun
        description: Image Update Notifier
        server: local
        container: diun

    - n8n:
        icon: n8n.png
        href: https://n8n.home.lan
        description: Workflow Automation
        server: local
        container: n8n

- System:
    - Portainer:
        icon: portainer.png
        href: https://portainer.home.lan
        description: Container Management
        server: local
        container: portainer
        widget:
          type: portainer
          url: http://portainer:9000
          env: 3
          key: {{HOMEPAGE_VAR_PORTAINER_KEY}}

    - Traefik:
        icon: traefik.png
        href: https://traefik.home.lan
        description: Reverse Proxy
        server: local
        container: traefik
        widget:
          type: traefik
          url: http://traefik:8080

    - Dozzle:
        icon: dozzle.png
        href: https://dozzle.home.lan
        description: Container Logs
        server: local
        container: dozzle
