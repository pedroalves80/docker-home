version: "3.8"

services:
  traefik:
    image: traefik:v2.10
    container_name: traefik
    networks:
      - proxy
    restart: unless-stopped
    command:
      - --configFile=/traefik/traefik.yml
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./configs/traefik/traefik.yml:/traefik/traefik.yml:ro
      - ./configs/traefik/cert.pem:/cert.pem
      - ./configs/traefik/key.pem:/key.pem
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.local.lan`)"
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls=true"

  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      # Web UI accessible via Traefik or Port 3001
      - "3001:3000"
    networks:
      - proxy
    volumes:
      - ./data/adguard/work:/opt/adguardhome/work
      - ./data/adguard/conf:/opt/adguardhome/conf
    environment:
      - TZ=${TZ:-UTC}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adguard.rule=Host(`adguard.local.lan`)"
      - "traefik.http.services.adguard.loadbalancer.server.port=3001"
      - "traefik.http.routers.adguard.entrypoints=websecure"
      - "traefik.http.routers.adguard.tls=true"

  # --- Model 3 instance
  teslamate_model3_db:
    image: postgres:18-trixie
    container_name: teslamate_model3_db
    restart: unless-stopped
    networks:
      - proxy
    environment:
      POSTGRES_USER: ${TM3_DB_USER:-tm3user}
      POSTGRES_PASSWORD: ${TM3_DB_PASS:-model3pass}
      POSTGRES_DB: ${TM3_DB_NAME:-teslamate_model3}
    volumes:
      - ./data/model3/postgres:/var/lib/postgresql/data

  teslamate_model3:
    image: teslamate/teslamate:latest
    container_name: teslamate_model3
    networks:
      - proxy
    restart: unless-stopped
    depends_on:
      - teslamate_model3_db
    environment:
      DATABASE_USER: ${TM3_DB_USER:-tm3user}
      DATABASE_PASS: ${TM3_DB_PASS:-model3pass}
      DATABASE_NAME: ${TM3_DB_NAME:-teslamate_model3}
      DATABASE_HOST: teslamate_model3_db
      MQTT_HOST: mosquitto
      ENCRYPTION_KEY: ${TM3_ENCRYPTION_KEY}
      TZ: ${TZ:-UTC}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.teslamate-model3.rule=Host(`teslamate-model3.local.lan`)"
      - "traefik.http.services.teslamate-model3.loadbalancer.server.port=4000"
      - "traefik.http.routers.teslamate-model3.entrypoints=websecure"
      - "traefik.http.routers.teslamate-model3.tls=true"

  # --- Model Y instance
  teslamate_modely_db:
    image: postgres:18-trixie
    container_name: teslamate_modely_db
    restart: unless-stopped
    networks:
      - proxy
    environment:
      POSTGRES_USER: ${TMY_DB_USER:-tmyuser}
      POSTGRES_PASSWORD: ${TMY_DB_PASS:-modelypass}
      POSTGRES_DB: ${TMY_DB_NAME:-teslamate_modely}
    volumes:
      - ./data/modely/postgres:/var/lib/postgresql/data

  teslamate_modely:
    image: teslamate/teslamate:latest
    container_name: teslamate_modely
    networks:
      - proxy
    restart: unless-stopped
    depends_on:
      - teslamate_modely_db
    environment:
      DATABASE_USER: ${TMY_DB_USER:-tmyuser}
      DATABASE_PASS: ${TMY_DB_PASS:-modelypass}
      DATABASE_NAME: ${TMY_DB_NAME:-teslamate_modely}
      DATABASE_HOST: teslamate_modely_db
      MQTT_HOST: mosquitto
      ENCRYPTION_KEY: ${TMY_ENCRYPTION_KEY}
      TZ: ${TZ:-UTC}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.teslamate-modely.rule=Host(`teslamate-modely.local.lan`)"
      - "traefik.http.services.teslamate-modely.loadbalancer.server.port=4000"
      - "traefik.http.routers.teslamate-modely.entrypoints=websecure"
      - "traefik.http.routers.teslamate-modely.tls=true"

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: always
    networks:
      - proxy
    command: mosquitto -c /mosquitto/config/mosquitto.conf
    volumes:
      - mosquitto-conf:/mosquitto/config
      - mosquitto-data:/mosquitto/data

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - proxy
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - TZ=${TZ:-UTC}
    volumes:
      - ./data/grafana:/var/lib/grafana
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.local.lan`)"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - ./data/homeassistant:/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homeassistant.rule=Host(`homeassistant.local.lan`)"
      - "traefik.http.services.homeassistant.loadbalancer.server.port=8123"
      - "traefik.http.routers.homeassistant.entrypoints=websecure"
      - "traefik.http.routers.homeassistant.tls=true"
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - ./data/vaultwarden:/data
    environment:
      - DOMAIN=https://vaultwarden.local.lan          # ← CHANGE THIS to match your Traefik rule!
      - SIGNUPS_ALLOWED=true                          # Set to false after creating your first account!
      - TZ=${TZ:-UTC}
      # Optional but highly recommended:
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}       # Generate a strong one! (see below)
      - WEBSOCKET_ENABLED=true                       # Real-time sync (default true, but explicit is good)
      # Rate limiting (anti-brute-force):
      - LOGIN_RATELIMIT_SECONDS=60
      - LOGIN_RATELIMIT_MAX_BURST=10
      - ADMIN_RATELIMIT_SECONDS=60
      - ADMIN_RATELIMIT_MAX_BURST=5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vaultwarden.rule=Host(`vaultwarden.local.lan`)"
      - "traefik.http.routers.vaultwarden.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden.tls=true"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"


  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - proxy
    restart: unless-stopped
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus:/prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.local.lan`)"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls=true"
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    networks:
      - proxy
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cadvisor.rule=Host(`cadvisor.local.lan`)"
      - "traefik.http.services.cadvisor.loadbalancer.server.port=8080"
      - "traefik.http.routers.cadvisor.entrypoints=websecure"
      - "traefik.http.routers.cadvisor.tls=true"
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: rpi-raven
    networks:
      - proxy
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - ./data/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      # You can generate an auth key in the Tailscale admin console to auto-login
      # - TS_AUTHKEY=tskey-auth-xxxxxxx 
      - TS_EXTRA_ARGS=--advertise-exit-node
    restart: unless-stopped

