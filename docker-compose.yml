services:
  traefik:
    image: traefik:v2.10
    container_name: traefik
    networks:
      - proxy
    restart: unless-stopped
    command:
      - --configFile=/traefik/traefik.yml
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./configs/traefik/traefik.yml:/traefik/traefik.yml:ro
      - ./configs/traefik/dynamic.yml:/traefik/dynamic.yml:ro
      - ./configs/traefik/cert.pem:/cert.pem
      - ./configs/traefik/key.pem:/key.pem
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.home.lan`)"
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls=true"
      - "traefik.http.routers.traefik.middlewares=authelia@docker"

  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    networks:
      - proxy
    restart: unless-stopped
    volumes:
      - ./configs/authelia:/config
    environment:
      - TZ=${TZ:-UTC}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      - AUTHELIA_JWT_SECRET=${AUTHELIA_JWT_SECRET}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authelia.rule=Host(`auth.home.lan`)"
      - "traefik.http.services.authelia.loadbalancer.server.port=9091"
      - "traefik.http.routers.authelia.entrypoints=websecure"
      - "traefik.http.routers.authelia.tls=true"
      - "traefik.http.middlewares.authelia.forwardauth.address=http://authelia:9091/api/authz/forward-auth"
      - "traefik.http.middlewares.authelia.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.authelia.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email"

  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      # Web UI accessible via Traefik or Port 3001
      - "3001:8080"
    networks:
      - proxy
    volumes:
      - ./data/adguard/work:/opt/adguardhome/work
      - ./data/adguard/conf:/opt/adguardhome/conf
    environment:
      - TZ=${TZ:-UTC}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adguard.rule=Host(`adguard.home.lan`)"
      - "traefik.http.services.adguard.loadbalancer.server.port=8080"
      - "traefik.http.routers.adguard.entrypoints=websecure"
      - "traefik.http.routers.adguard.tls=true"

  # --- Model 3 instance
  teslamate_model3_db:
    image: postgres:16
    container_name: teslamate_model3_db
    restart: unless-stopped
    networks:
      - proxy
    environment:
      POSTGRES_USER: ${TM3_DB_USER:-tm3user}
      POSTGRES_PASSWORD: ${TM3_DB_PASS:-model3pass}
      POSTGRES_DB: ${TM3_DB_NAME:-teslamate_model3}
    volumes:
      - ./data/model3/postgres:/var/lib/postgresql/data

  teslamate_model3:
    image: teslamate/teslamate:latest
    container_name: teslamate_model3
    networks:
      - proxy
    restart: unless-stopped
    depends_on:
      - teslamate_model3_db
    environment:
      DATABASE_USER: ${TM3_DB_USER:-tm3user}
      DATABASE_PASS: ${TM3_DB_PASS:-model3pass}
      DATABASE_NAME: ${TM3_DB_NAME:-teslamate_model3}
      DATABASE_HOST: teslamate_model3_db
      MQTT_HOST: mosquitto
      ENCRYPTION_KEY: ${TM3_ENCRYPTION_KEY}
      TZ: ${TZ:-UTC}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.teslamate-model3.rule=Host(`teslamate-model3.home.lan`)"
      - "traefik.http.services.teslamate-model3.loadbalancer.server.port=4000"
      - "traefik.http.routers.teslamate-model3.entrypoints=websecure"
      - "traefik.http.routers.teslamate-model3.tls=true"
      - "traefik.http.routers.teslamate-model3.middlewares=authelia@docker"

  # --- Model Y instance
  teslamate_modely_db:
    image: postgres:16
    container_name: teslamate_modely_db
    restart: unless-stopped
    networks:
      - proxy
    environment:
      POSTGRES_USER: ${TMY_DB_USER:-tmyuser}
      POSTGRES_PASSWORD: ${TMY_DB_PASS:-modelypass}
      POSTGRES_DB: ${TMY_DB_NAME:-teslamate_modely}
    volumes:
      - ./data/modely/postgres:/var/lib/postgresql/data

  teslamate_modely:
    image: teslamate/teslamate:latest
    container_name: teslamate_modely
    networks:
      - proxy
    restart: unless-stopped
    depends_on:
      - teslamate_modely_db
    environment:
      DATABASE_USER: ${TMY_DB_USER:-tmyuser}
      DATABASE_PASS: ${TMY_DB_PASS:-modelypass}
      DATABASE_NAME: ${TMY_DB_NAME:-teslamate_modely}
      DATABASE_HOST: teslamate_modely_db
      MQTT_HOST: mosquitto
      ENCRYPTION_KEY: ${TMY_ENCRYPTION_KEY}
      TZ: ${TZ:-UTC}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.teslamate-modely.rule=Host(`teslamate-modely.home.lan`)"
      - "traefik.http.services.teslamate-modely.loadbalancer.server.port=4000"
      - "traefik.http.routers.teslamate-modely.entrypoints=websecure"
      - "traefik.http.routers.teslamate-modely.tls=true"
      - "traefik.http.routers.teslamate-modely.middlewares=authelia@docker"

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: always
    networks:
      - proxy
    command: mosquitto -c /mosquitto/config/mosquitto.conf
    volumes:
      - mosquitto-conf:/mosquitto/config
      - mosquitto-data:/mosquitto/data

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - proxy
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - TZ=${TZ:-UTC}
    volumes:
      - ./data/grafana:/var/lib/grafana
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.home.lan`)"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    restart: unless-stopped
    ports:
      - "8123:8123"
    networks:
      - proxy
    volumes:
      - ./data/homeassistant:/config
    environment:
      - TZ=${TZ:-UTC}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homeassistant.rule=Host(`homeassistant.home.lan`)"
      - "traefik.http.services.homeassistant.loadbalancer.server.port=8123"
      - "traefik.http.routers.homeassistant.entrypoints=websecure"
      - "traefik.http.routers.homeassistant.tls=true"
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    networks:
      - proxy
    volumes:
      - ./data/vaultwarden:/data
    environment:
      - DOMAIN=https://vaultwarden.home.lan          # ← CHANGE THIS to match your Traefik rule!
      - SIGNUPS_ALLOWED=true                          # Set to false after creating your first account!
      - TZ=${TZ:-UTC}
      # Optional but highly recommended:
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}       # Generate a strong one! (see below)
      - WEBSOCKET_ENABLED=true                       # Real-time sync (default true, but explicit is good)
      # Rate limiting (anti-brute-force):
      - LOGIN_RATELIMIT_SECONDS=60
      - LOGIN_RATELIMIT_MAX_BURST=10
      - ADMIN_RATELIMIT_SECONDS=60
      - ADMIN_RATELIMIT_MAX_BURST=5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vaultwarden.rule=Host(`vaultwarden.home.lan`)"
      - "traefik.http.routers.vaultwarden.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden.tls=true"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"


  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - proxy
    restart: unless-stopped
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus:/prometheus
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.home.lan`)"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls=true"
      - "traefik.http.routers.prometheus.middlewares=authelia@docker"
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    networks:
      - proxy
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cadvisor.rule=Host(`cadvisor.home.lan`)"
      - "traefik.http.services.cadvisor.loadbalancer.server.port=8080"
      - "traefik.http.routers.cadvisor.entrypoints=websecure"
      - "traefik.http.routers.cadvisor.tls=true"
      - "traefik.http.routers.cadvisor.middlewares=authelia@docker"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    networks:
      - proxy
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /:/host:ro,rslave
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.node-exporter.rule=Host(`node-exporter.home.lan`)"
      - "traefik.http.services.node-exporter.loadbalancer.server.port=9100"
      - "traefik.http.routers.node-exporter.entrypoints=websecure"
      - "traefik.http.routers.node-exporter.tls=true"
      - "traefik.http.routers.node-exporter.middlewares=authelia@docker"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    networks:
      - proxy
    restart: unless-stopped
    volumes:
      - ./data/uptime-kuma:/app/data
    environment:
      - TZ=${TZ:-UTC}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime-kuma.rule=Host(`uptime.home.lan`)"
      - "traefik.http.services.uptime-kuma.loadbalancer.server.port=3001"
      - "traefik.http.routers.uptime-kuma.entrypoints=websecure"
      - "traefik.http.routers.uptime-kuma.tls=true"

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    networks:
      - proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/portainer:/data
    environment:
      - TZ=${TZ:-UTC}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.home.lan`)"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls=true"
      - "traefik.http.routers.portainer.middlewares=authelia@docker"

  glance:
    image: glanceapp/glance:latest
    container_name: glance
    networks:
      - proxy
    restart: unless-stopped
    volumes:
      - ./configs/glance/glance.yml:/app/config/glance.yml:ro
    environment:
      - TZ=${TZ:-UTC}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.glance.rule=Host(`home.lan`)"
      - "traefik.http.services.glance.loadbalancer.server.port=8080"
      - "traefik.http.routers.glance.entrypoints=websecure"
      - "traefik.http.routers.glance.tls=true"

  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: rpi-raven
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - ./data/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_EXTRA_ARGS=--advertise-routes=10.10.99.0/24 --advertise-exit-node --accept-dns=false
    restart: unless-stopped

  # PriceBuddy - Price tracking and wishlist
  pricebuddy_db:
    image: mysql:8.2
    container_name: pricebuddy_db
    restart: unless-stopped
    networks:
      - proxy
    environment:
      MYSQL_DATABASE: ${PRICEBUDDY_DB_NAME:-pricebuddy}
      MYSQL_USER: ${PRICEBUDDY_DB_USER:-pricebuddy}
      MYSQL_PASSWORD: ${PRICEBUDDY_DB_PASS:-pricebuddy123}
      MYSQL_ROOT_PASSWORD: ${PRICEBUDDY_DB_ROOT_PASS:-rootpass123}
    volumes:
      - ./data/pricebuddy/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 1m

  pricebuddy_scraper:
    image: jez500/seleniumbase-scrapper:latest
    container_name: pricebuddy_scraper
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - DEFAULT_CACHE=true
      - DEFAULT_CACHE_TTL=3600
      - DEFAULT_TIMEOUT=60000
      - DEFAULT_INCOGNITO=true

  pricebuddy:
    image: jez500/pricebuddy:latest
    container_name: pricebuddy
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      pricebuddy_db:
        condition: service_healthy
    environment:
      - APP_KEY=${PRICEBUDDY_APP_KEY}
      - APP_URL=https://pricebuddy.home.lan
      - ASSET_URL=https://pricebuddy.home.lan
      - FORCE_HTTPS=true
      - TRUSTED_PROXIES=*
      - DB_HOST=pricebuddy_db
      - DB_USERNAME=${PRICEBUDDY_DB_USER:-pricebuddy}
      - DB_PASSWORD=${PRICEBUDDY_DB_PASS:-pricebuddy123}
      - DB_DATABASE=${PRICEBUDDY_DB_NAME:-pricebuddy}
      - APP_USER_EMAIL=${PRICEBUDDY_ADMIN_EMAIL:-admin@example.com}
      - APP_USER_PASSWORD=${PRICEBUDDY_ADMIN_PASS:-admin}
      - SCRAPER_BASE_URL=http://pricebuddy_scraper:3000
      - AFFILIATE_ENABLED=false
      - TZ=${TZ:-UTC}
    volumes:
      - ./data/pricebuddy/storage:/app/storage
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pricebuddy.rule=Host(`pricebuddy.home.lan`)"
      - "traefik.http.services.pricebuddy.loadbalancer.server.port=80"
      - "traefik.http.routers.pricebuddy.entrypoints=websecure"
      - "traefik.http.routers.pricebuddy.tls=true"
      - "traefik.http.middlewares.pricebuddy-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.pricebuddy.middlewares=pricebuddy-headers"

  apprise:
    image: caronc/apprise:latest
    container_name: apprise
    restart: unless-stopped
    networks:
      - proxy
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-UTC}
      - APPRISE_STATEFUL_MODE=simple
      - APPRISE_WORKER_COUNT=1
      - APPRISE_DEFAULT_THEME=light
    volumes:
      - ./data/apprise/config:/config
      - ./data/apprise/attach:/attach
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.apprise.rule=Host(`apprise.home.lan`)"
      - "traefik.http.services.apprise.loadbalancer.server.port=8000"
      - "traefik.http.routers.apprise.entrypoints=websecure"
      - "traefik.http.routers.apprise.tls=true"
      - "traefik.http.routers.apprise.middlewares=authelia@docker"

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    networks:
      - proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ:-UTC}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dozzle.rule=Host(`dozzle.home.lan`)"
      - "traefik.http.services.dozzle.loadbalancer.server.port=8080"
      - "traefik.http.routers.dozzle.entrypoints=websecure"
      - "traefik.http.routers.dozzle.tls=true"
      - "traefik.http.routers.dozzle.middlewares=authelia@docker"

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    networks:
      - proxy
    restart: unless-stopped
    volumes:
      - ./data/n8n:/home/node/.n8n
    environment:
      - TZ=${TZ:-UTC}
      - N8N_HOST=n8n.home.lan
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.home.lan/
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.home.lan`)"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls=true"

  diun:
    image: crazymax/diun:latest
    container_name: diun
    networks:
      - proxy
    restart: unless-stopped
    volumes:
      - ./configs/diun/diun.yml:/diun.yml:ro
      - ./data/diun:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ:-UTC}
      - LOG_LEVEL=info
      - DIUN_TELEGRAM_TOKEN=${DIUN_TELEGRAM_TOKEN}
      - DIUN_TELEGRAM_CHAT_ID=${DIUN_TELEGRAM_CHAT_ID}

networks:
  proxy:
    name: proxy_network
    driver: bridge

volumes:
  mosquitto-conf:
  mosquitto-data:

